############################# annonces ###################################
annonces:
  enable: true
  title: Annoucements
  items:
    - title: Exams starting on March 16
      content:
        Exams for the transition from white to yellow and from yellow to orange will begin on Monday, March 16 and Wednesday, March 18. Exams for higher belts will take place in the following weeks. We encourage all students to continue practicing at home. 
    - title: Special Hapkido Workshop on Wednesday, April 8
      content:
        We are excited to announce a special Hapkido workshop that will take place on Wednesday, April 8 from 7:30pm to 9pm at École Jean-Leman. This workshop is open to all members of the school. This is a great opportunity to explore another martial arts discipline and improve your self-defense skills. We hope to see many of you there!
    - title: Belt ceremony on Monday, April 20
      content:
        The belt ceremony, open to all members of the school, will take place on Monday, April 20 at 7pm at École Jean-Leman.
    - title: Online Store for Candiac Karate sportswear
      content:
        We are excited to announce the launch of our official online store!
        You can now purchase hoodies, t-shirts, sleeveless shirts to wear under the gi,
        and zip-up jackets, all featuring the school's logo. You can have the items delivered
        to your home or pick them up directly at the store in Saint-Hubert.
        [Click here to access the store and order your items](https://boutiqueimbo-2.ca/en-ligne/fr/karate-candiac-c141/).
    - title: The Candiac Karate School is celebrating its 50th anniversary!
      content: It was in January 1976 that karate classes began in
        Candiac, under the direction of Sensei (Soke) Normand Théoret. To celebrate this
        important milestone, we will be organizing a series of events throughout the
        2025-2026 session. Stay tuned for more details!
