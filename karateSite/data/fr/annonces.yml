############################# annonces ###################################
annonces:
  enable: true
  title: Annonces
  items:
    - title: Cours annulés le 11 mars
      content:
        Les cours de karaté du mardi 11 mars sont annulés en raison de la fermeture des écoles. Nous nous excusons pour tout inconvénient que cela pourrait causer et encourageons tous les membres à rester en sécurité pendant les conditions météorologiques difficiles.
    - title: Début des examens le 16 mars
      content:
        Les examens pour le passage de blanche à jaune et de jaune à orange débuteront le lundi 16 mars et mercredi 18 mars. Les examens pour les ceintures supérieures auront lieu dans les semaines suivantes. Nous encourageons tous les étudiants à continuer de pratiquer à la maison. 
    - title: Stage spécial de Hapkido le mercredi 8 avril
      content:
        Nous sommes heureux d'annoncer un stage spécial de Hapkido qui aura lieu le mercredi 8 avril de 19h30 à 21h au Dojo de l'École Jean-Leman. Ce stage est ouvert à tous les membres de l'école. C'est une excellente occasion d'explorer une autre discipline martiale et d'améliorer vos compétences en auto-défense. Nous espérons vous y voir nombreux!
    - title: Cérémonie de remise des ceintures le lundi 20 avril
      content:
        La cérémonie de remise de ceintures, ouverte à tous les membres de l'école, aura lieu le lundi 20 avril à 19h à l'École Jean-Leman. 
    - title: Boutique en ligne pour chandails Karaté Candiac
      content:
        Nous sommes ravis d'annoncer le lancement de notre boutique en ligne
        officielle! Vous pouvez désormais acheter des chandails à capuchon, des t-shirts,
        des camisoles sans maches pour mettre sous le gi et des vestes avec fermeture éclair,
        avec le logo de l'école. Vous pouvez faire livrer les articles à la maison ou aller les
        chercher directement à la boutique à Saint-Hubert.
        [Cliquez-ici pour accéder à la boutique et commander vos articles](https://boutiqueimbo-2.ca/en-ligne/fr/karate-candiac-c141/).
    - title: L'École de karaté Candiac fête ses 50 ans!
      content: C'est en janvier 1976 que débutèrent les cours de karaté à
        Candiac, sous la direction de Sensei (Soke) Normand Théoret. Pour célébrer ce
        jalon important, nous organiserons une série d'événements tout au long de
        la session 2025-2026. Restez à l'écoute pour plus de détails!
